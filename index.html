<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Swara Events · Luxury Wedding Menu</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ---------- RESET & LUXURY VARIABLES ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #c6a15b;
      --gold-light: #e5d2af;
      --black: #1a1714;
      --black-soft: #2f2a24;
      --black-matte: #1e1b18;
      --cream: #faf7f0;
      --glass: rgba(255, 255, 255, 0.08);
      --shadow-heavy: 0 20px 40px -12px rgba(0,0,0,0.5);
      --shadow-soft: 0 15px 30px -10px rgba(0,0,0,0.3);
      --border-gold: 1px solid rgba(198, 161, 91, 0.3);
      --transition-smooth: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--black);
      color: var(--cream);
      line-height: 1.5;
      scroll-behavior: smooth;
    }
    h1, h2, h3, .heading-font {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .wrapper {
      max-width: 1400px;
      margin: 0 auto;
      background: var(--black-matte);
      overflow-x: hidden;
    }

    /* ---------- HERO (FULL SCREEN WITH PARALLAX) ---------- */
    .hero {
      height: 100vh;
      min-height: 700px;
      background: linear-gradient(115deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 70%), 
                  url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop') center/cover;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      border-bottom: 2px solid var(--gold);
      animation: heroFadeIn 1.5s ease;
    }
    @keyframes heroFadeIn {
      0% { opacity: 0; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    .hero-content {
      max-width: 900px;
      padding: 2rem;
      backdrop-filter: blur(6px);
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(198, 161, 91, 0.2);
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      transform: translateY(0);
      transition: var(--transition-smooth);
    }
    .hero-content:hover {
      transform: translateY(-10px);
      box-shadow: 0 40px 80px rgba(198, 161, 91, 0.2);
    }
    .hero h1 {
      font-size: clamp(3rem, 12vw, 5.5rem);
      color: var(--gold);
      text-shadow: 0 4px 15px rgba(0,0,0,0.7);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .hero .tagline {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 2rem;
      color: #fff0e0;
    }
    .btn-group {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      font-family: 'Poppins', sans-serif;
      padding: 1rem 2.8rem;
      border-radius: 50px;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    .btn:hover::after {
      width: 300px;
      height: 300px;
    }
    .btn-primary {
      background: var(--gold);
      color: #000;
      border: 1px solid #f5d89c;
    }
    .btn-primary:hover {
      background: #dbb268;
      transform: translateY(-4px);
      box-shadow: 0 18px 30px rgba(198,161,91,0.3);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--gold);
      color: white;
    }
    .btn-outline:hover {
      background: var(--gold);
      color: black;
      transform: translateY(-4px);
    }

    /* ---------- STICKY CATEGORY TABS (SMOOTH) ---------- */
    .tabs-container {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26, 23, 20, 0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--gold);
      padding: 0.7rem 1rem;
      transition: all 0.3s;
    }
    .tabs-scroll {
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      scrollbar-width: none;
      justify-content: flex-start;
      max-width: 1200px;
      margin: 0 auto;
      -webkit-overflow-scrolling: touch;
    }
    .tabs-scroll::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 0 0 auto;
      background: transparent;
      border: 1px solid rgba(198,161,91,0.5);
      color: #f0e6d8;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    .tab-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(198,161,91,0.2), transparent);
      transition: left 0.5s;
    }
    .tab-btn:hover::before {
      left: 100%;
    }
    .tab-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
      box-shadow: 0 0 20px #c6a15b;
      transform: scale(1.05);
    }

    /* ---------- SERVICES SECTION ---------- */
    .services-section {
      max-width: 1300px;
      margin: 2rem auto 4rem;
      padding: 0 1rem;
    }
    .category-section {
      margin-bottom: 4rem;
      transition: opacity 0.5s ease, transform 0.5s ease;
      animation: slideUp 0.6s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .category-title {
      font-size: 2.5rem;
      color: var(--gold);
      border-left: 6px solid var(--gold);
      padding-left: 1.5rem;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      position: relative;
    }
    .category-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 1.5rem;
      width: 50px;
      height: 2px;
      background: var(--gold);
      animation: lineExpand 1s ease;
    }
    @keyframes lineExpand {
      from { width: 0; }
      to { width: 50px; }
    }
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    @media (min-width: 640px) {
      .services-grid { grid-template-columns: repeat(2, 1fr); }
      .tabs-scroll { justify-content: center; }
    }
    @media (min-width: 1024px) {
      .services-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ---------- LUXURY CARD (WITH BIGGER IMAGE) ---------- */
    .service-card {
      background: rgba(20, 18, 16, 0.8);
      backdrop-filter: blur(10px);
      border: var(--border-gold);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      transition: var(--transition-smooth);
      display: flex;
      flex-direction: column;
      width: 100%;
      position: relative;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 28px;
      padding: 2px;
      background: linear-gradient(145deg, var(--gold), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .service-card:hover::before {
      opacity: 1;
    }
    .service-card:hover {
      transform: scale(1.02) translateY(-8px);
      box-shadow: var(--shadow-heavy), 0 0 0 2px rgba(198,161,91,0.2);
      border-color: var(--gold);
    }

    /* BIGGER IMAGE GALLERY WITH NEXT BUTTON */
    .card-gallery {
      position: relative;
      width: 100%;
      height: 260px;
      overflow: hidden;
      background: #222;
    }
    .gallery-slider {
      display: flex;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
    }
    .gallery-slider img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
      background: #3a2e26;
      border-bottom: 2px solid var(--gold);
      transition: transform 0.5s;
    }
    .gallery-slider img:hover {
      transform: scale(1.05);
    }
    
    /* नया नेक्स्ट बटन - दाएं कोने में */
    .next-btn {
      position: absolute;
      top: 50%;
      right: 15px;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: var(--gold);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid var(--gold);
      font-size: 1.5rem;
      font-weight: bold;
      z-index: 10;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .next-btn:hover {
      background: var(--gold);
      color: black;
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 0 20px var(--gold);
    }
    
    /* डॉट्स को थोड़ा सा शिफ्ट किया ताकि बटन से ना टकराएं */
    .gallery-nav {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 5;
    }
    .gallery-dot {
      width: 32px;
      height: 5px;
      background: rgba(255,255,255,0.4);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(0,0,0,0.3);
    }
    .gallery-dot:hover {
      background: rgba(198,161,91,0.8);
      transform: scaleY(1.5);
    }
    .gallery-dot.active-dot {
      background: var(--gold);
      width: 40px;
    }
    
    .card-content {
      padding: 1.5rem 1.5rem 1.8rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .service-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff8ed;
      margin-bottom: 0.25rem;
      line-height: 1.2;
      transition: color 0.3s;
    }
    .service-card:hover .service-name {
      color: var(--gold-light);
    }
    .service-desc {
      font-size: 0.9rem;
      color: #cfc5b8;
      margin: 0.5rem 0 1rem;
      transition: color 0.3s;
    }
    .price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0.5rem 0 1.2rem;
    }
    .price {
      background: rgba(198,161,91,0.15);
      border: 1px solid var(--gold);
      padding: 0.8rem 1.3rem;
      border-radius: 40px;
      font-weight: 500;
      color: var(--gold-light);
      font-size: 0.95rem;
      transition: all 0.3s;
      text-align: center;
    }
    .service-card:hover .price {
      background: rgba(198,161,91,0.3);
      transform: scale(1.05);
    }
    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      border-top: 1px dashed rgba(198,161,91,0.4);
      padding-top: 1rem;
    }
    .add-to-cart {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 0.5rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .add-to-cart:hover {
      background: var(--gold);
      color: #000;
      transform: translateX(5px);
    }
    .lightbox-btn {
      background: none;
      border: none;
      color: #ddd;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 5px;
      transition: transform 0.3s;
    }
    .lightbox-btn:hover { 
      color: var(--gold); 
      transform: rotate(90deg);
    }

    /* ---------- FLOATING CART BUTTON (BOTTOM RIGHT) ---------- */
    .cart-float {
      position: fixed;
      bottom: 20px;
      right: 15px;
      z-index: 200;
      background: #1e1b18;
      border: 2px solid var(--gold);
      border-radius: 60px;
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 15px 30px black;
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: all 0.3s;
      animation: bounceIn 0.8s;
    }
    @keyframes bounceIn {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .cart-float:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 40px rgba(198,161,91,0.3);
    }
    .cart-icon {
      color: var(--gold);
      font-size: 2rem;
      position: relative;
    }
    .cart-count {
      background: #c6a15b;
      color: black;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
      position: absolute;
      top: -5px;
      right: -10px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .cart-panel {
      position: fixed;
      bottom: 90px;
      right: 15px;
      width: 300px;
      max-width: calc(100% - 30px);
      background: #231f1b;
      border: 1px solid var(--gold);
      border-radius: 28px;
      padding: 1.2rem;
      box-shadow: var(--shadow-heavy);
      backdrop-filter: blur(16px);
      display: none;
      z-index: 210;
      animation: slideUp 0.3s;
    }
    .cart-panel.show { display: block; }
    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid #3f372e;
      flex-wrap: wrap;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .cart-item-name { font-weight: 400; }
    .cart-item-qty { display: flex; gap: 10px; align-items: center; }
    .cart-item-qty button {
      background: none;
      border: 1px solid var(--gold);
      color: white;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cart-item-qty button:hover {
      background: var(--gold);
      color: black;
      transform: scale(1.1);
    }
    .btn-send-inquiry {
      background: var(--gold);
      width: 100%;
      border: none;
      padding: 1rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-send-inquiry:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(198,161,91,0.3);
    }

    /* ---------- INQUIRY MODAL ---------- */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1f1b17;
      border: 2px solid var(--gold);
      border-radius: 40px;
      max-width: 500px;
      width: 90%;
      padding: 2rem 1.5rem;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalPop 0.4s;
    }
    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-content h3 {
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .modal-content input, .modal-content textarea, .modal-content select {
      width: 100%;
      padding: 1rem;
      margin-bottom: 1.2rem;
      background: #2f2a24;
      border: 1px solid #5a4d3e;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      color: white;
      transition: all 0.3s;
    }
    .modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus {
      border-color: var(--gold);
      outline: none;
      box-shadow: 0 0 15px rgba(198,161,91,0.3);
      transform: scale(1.02);
    }
    .modal-content button {
      background: var(--gold);
      border: none;
      padding: 1rem;
      width: 100%;
      border-radius: 50px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .modal-content button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(198,161,91,0.3);
    }

    /* Lightbox */
    .lightbox-modal {
      display: none;
      position: fixed;
      top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.95);
      z-index:2000;
      justify-content:center;
      align-items:center;
    }
    .lightbox-modal img {
      max-width:90%;
      max-height:90%;
      border:3px solid gold;
      animation: zoomIn 0.3s;
    }
    @keyframes zoomIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .lightbox-modal.show { display: flex; }

    /* Footer - ONLY ICONS (no text) */
    .luxury-footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #3f372e;
      color: #b5a58b;
    }
    .social-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      align-items: center;
      margin: 1rem 0 0.5rem;
      flex-wrap: wrap;
    }
    .social-links a {
      color: var(--gold-light);
      font-size: 2rem;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .social-links a:hover {
      color: var(--gold);
      transform: translateY(-3px);
    }
    .social-links .whatsapp-icon { color: #25D366; }
    .social-links .whatsapp-icon:hover { color: #128C7E; }

    /* hidden */
    .hidden-category { display: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- HERO SECTION -->
    <section class="hero" id="home">
      <div class="hero-content">
        <h1>Swara Events</h1>
        <div class="tagline">Creating Unforgettable Wedding & Celebration Experiences</div>
        <div class="btn-group">
          <a href="#services" class="btn btn-primary" id="viewServicesBtn">View Services</a>
          <button class="btn btn-outline" id="bookEventHero">Book Event</button>
        </div>
      </div>
    </section>

    <!-- STICKY TABS -->
    <div class="tabs-container">
      <div class="tabs-scroll" id="tabScroll"></div>
    </div>

    <!-- SERVICES SECTION -->
    <section class="services-section" id="services">
      <div id="servicesContainer"></div>
    </section>

    <!-- FLOATING CART BUTTON -->
    <div class="cart-float" id="cartFloat">
      <div class="cart-icon">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count" id="cartCount">0</span>
      </div>
      <span style="color:white;">Cart</span>
    </div>
    <!-- CART PANEL -->
    <div class="cart-panel" id="cartPanel">
      <h4 style="color:gold; margin-bottom:1rem;">Your selection</h4>
      <div id="cartItemsList"></div>
      <button class="btn-send-inquiry" id="sendInquiryBtn">Send Inquiry</button>
    </div>

    <!-- INQUIRY MODAL -->
    <div class="modal" id="inquiryModal">
      <div class="modal-content">
        <h3>Complete details</h3>
        <input type="text" placeholder="Your Name" id="inquiryName">
        <input type="tel" placeholder="Phone Number" id="inquiryPhone">
        <select id="inquiryEventType">
          <option value="">Select Event Type</option>
          <option>Wedding</option>
          <option>Engagement</option>
          <option>Reception</option>
          <option>Corporate</option>
        </select>
        <input type="date" id="inquiryDate">
        <input type="text" placeholder="Event Location" id="inquiryLocation">
        <textarea placeholder="Extra message" rows="2" id="inquiryMsg"></textarea>
        <button id="submitInquiry">📲 Send to WhatsApp</button>

    //   const categories = ["Wedding Services","Baraat Entry","Vehicles"];
    //   let cart = [];



const servicesData = [
  { cat:"Baraat Entry", name:"BRASS BAND", desc:"12-piece traditional brass band with Punjabi beats", price:null, images:["img/brass_band2.jpeg","img/brass_band1.jpeg"] },
  { cat:"Wedding Services", name:"BARAAT ON WHEELS", desc:"Grand entry with decorated tractor/trolley & lights", price:null, images:["img/baraat_wheels1.jpeg","img/baraat_wheels2.jpeg"] },
  { cat:"Baraat Entry", name:"PANJABI DHOLS", desc:"High-energy Punjabi dhol players for baraat", price:null, images:["img/dhol1.jpeg","img/dhol1.jpeg"] },
  { cat:"Baraat Entry", name:"NASHIK DHOLS", desc:"Powerful Nashik style dhol percussionists", price:null, images:["img/nashik_dhol1.jpeg","img/nashik_dhol2.jpeg"] },

  { cat:"Vehicles", name:"HORSE", desc:"Royal decorated horse for groom entry", price:null, images:["img/horse1.jpeg","img/horse2.jpeg"] },

  { cat:"Baraat Entry", name:"HALGI GROUP", desc:"Traditional halgi (small drum) players group", price:null, images:["img/halgi1.jpeg","img/halgi2.jpeg"] }
];

const categories = ["Wedding Services","Baraat Entry","Vehicles"];
let cart = [];



      // Render Tabs
      const tabScroll = document.getElementById('tabScroll');
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn'; btn.dataset.category = cat; btn.textContent = cat;
        tabScroll.appendChild(btn);
      });

      // Render Cards with Next Button
      function renderCards() {
        let html = '';
        categories.forEach(cat => {
          const items = servicesData.filter(s => s.cat === cat);
          if(!items.length) return;
          html += `<div class="category-section" data-category="${cat}"><h2 class="category-title">${cat}</h2><div class="services-grid">`;
          items.forEach((s, idx) => {
            const uniqueId = `${cat}-${idx}`;
            html += `<div class="service-card">`;
            html += `<div class="card-gallery" data-card-id="${uniqueId}">`;
            html += `<div class="gallery-slider" id="slider-${uniqueId}">`;
            s.images.forEach(img => { html += `<img src="${img}" loading="lazy" alt="${s.name}" onerror="this.src='https://via.placeholder.com/600x400?text=Luxury'">`; });
            html += `</div>`;
            // नेक्स्ट बटन यहाँ डाला
            html += `<div class="next-btn" data-card="${uniqueId}">&#62;</div>`;
            html += `<div class="gallery-nav" id="nav-${uniqueId}">`;
            for(let i=0; i<s.images.length; i++) html += `<span class="gallery-dot ${i===0?'active-dot':''}" data-index="${i}"></span>`;
            html += `</div></div>`;
            html += `<div class="card-content">
              <div class="service-name">${s.name}</div><div class="service-desc">${s.desc}</div>
              <div class="price-row"><span class="price">After inquiry you will get pricing</span></div>
              <div class="card-actions">
                <button class="add-to-cart" data-name="${s.name}" data-price="Inquiry"><i class="fas fa-plus-circle"></i> Add</button>
                <button class="lightbox-btn" data-images='${JSON.stringify(s.images)}'><i class="fas fa-expand"></i></button>
              </div></div>`;
            html += `</div>`;
          });
          html += `</div></div>`;
        });
        document.getElementById('servicesContainer').innerHTML = html;
        attachGalleryListeners();
        attachAddToCart();
        attachNextButtons(); // नेक्स्ट बटन के लिए लिसनर
      }

      // गैलरी डॉट्स का काम
      function attachGalleryListeners() {
        document.querySelectorAll('.card-gallery').forEach(gallery => {
          const slider = gallery.querySelector('.gallery-slider');
          const dots = gallery.querySelectorAll('.gallery-dot');
          if(!slider || !dots.length) return;
          
          const updateSlide = (index) => { 
            slider.style.transform = `translateX(-${index * 100}%)`; 
            dots.forEach((d,i)=> d.classList.toggle('active-dot', i===index)); 
          };
          
          dots.forEach((dot,i) => { 
            dot.addEventListener('click', (e) => { 
              e.stopPropagation(); 
              updateSlide(i); 
            }); 
          });
        });
      }

      // नेक्स्ट बटन का फंक्शन
      function attachNextButtons() {
        document.querySelectorAll('.next-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const cardId = btn.dataset.card;
            const gallery = btn.closest('.card-gallery');
            const slider = gallery.querySelector('.gallery-slider');
            const dots = gallery.querySelectorAll('.gallery-dot');
            const totalImages = dots.length;
            
            // कौन सी इमेज एक्टिव है पता करो
            let activeIndex = 0;
            dots.forEach((dot, index) => {
              if(dot.classList.contains('active-dot')) activeIndex = index;
            });
            
            // अगली इमेज पर जाओ
            let nextIndex = (activeIndex + 1) % totalImages;
            
            // स्लाइडर को मूव करो
            slider.style.transform = `translateX(-${nextIndex * 100}%)`;
            
            // डॉट्स अपडेट करो
            dots.forEach((d,i) => d.classList.toggle('active-dot', i === nextIndex));
          });
        });
      }

      function attachAddToCart() {
        document.querySelectorAll('.add-to-cart').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const name = btn.dataset.name; const price = btn.dataset.price;
            const existing = cart.find(item => item.name === name);
            if(existing) existing.qty++; else cart.push({ name, price, qty:1 });
            updateCartUI();
          });
        });
      }

      function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.reduce((acc, i) => acc + i.qty, 0);
        let itemsHtml = '';
        cart.forEach((item, idx) => {
          itemsHtml += `<div class="cart-item"><span class="cart-item-name">${item.name}</span>
            <div class="cart-item-qty"><button class="qty-dec" data-index="${idx}">-</button> <span>${item.qty}</span> <button class="qty-inc" data-index="${idx}">+</button>
            <button class="remove-item" data-index="${idx}"><i class="fas fa-trash"></i></button></div></div>`;
        });
        document.getElementById('cartItemsList').innerHTML = itemsHtml || '<p style="color:#a28b72;">Your cart is empty</p>';
        
        document.querySelectorAll('.qty-dec').forEach(b => b.addEventListener('click', (e) => { 
          let idx = e.target.closest('button')?.dataset?.index; 
          if(idx) { idx=parseInt(idx); if(cart[idx].qty>1) cart[idx].qty--; else cart.splice(idx,1); updateCartUI(); } 
        }));
        document.querySelectorAll('.qty-inc').forEach(b => b.addEventListener('click', (e) => { 
          let idx = e.target.closest('button')?.dataset?.index; 
          if(idx) { idx=parseInt(idx); cart[idx].qty++; updateCartUI(); } 
        }));
        document.querySelectorAll('.remove-item').forEach(b => b.addEventListener('click', (e) => { 
          let idx = e.target.closest('button')?.dataset?.index; 
          if(idx) { idx=parseInt(idx); cart.splice(idx,1); updateCartUI(); } 
        }));
      }

      function filterServices(cat) {
        document.querySelectorAll('.category-section').forEach(s => s.classList.toggle('hidden-category', s.dataset.category !== cat));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.category === cat));
      }

      const lightbox = document.getElementById('lightbox');
      document.addEventListener('click', (e) => {
        if(e.target.closest('.lightbox-btn')) {
          const btn = e.target.closest('.lightbox-btn');
          const images = JSON.parse(btn.dataset.images);
          if(images?.length) { document.getElementById('lightboxImg').src = images[0]; lightbox.classList.add('show'); }
        }
      });
      lightbox.addEventListener('click', () => lightbox.classList.remove('show'));

      document.getElementById('cartFloat').addEventListener('click', (e) => { document.getElementById('cartPanel').classList.toggle('show'); });

      const modal = document.getElementById('inquiryModal');
      document.getElementById('sendInquiryBtn').addEventListener('click', ()=> { if(cart.length) modal.classList.add('active'); else alert('Add services first'); });
      document.getElementById('closeModal').addEventListener('click', ()=> modal.classList.remove('active'));
      document.getElementById('bookEventHero').addEventListener('click', ()=> modal.classList.add('active'));

      document.getElementById('submitInquiry').addEventListener('click', ()=> {
        const name = document.getElementById('inquiryName').value;
        const phone = document.getElementById('inquiryPhone').value;
        const eventType = document.getElementById('inquiryEventType').value;
        const date = document.getElementById('inquiryDate').value;
        const location = document.getElementById('inquiryLocation').value;
        const msg = document.getElementById('inquiryMsg').value;

        let cartList = '';
        cart.forEach(i => { cartList += `${i.name} (${i.qty}x)\n`; });
        
        const fullMsg = `Hello Swara Events,

I want to inquire about the following services:

${cartList}
Customer Details:
Name: ${name}
Phone: ${phone}
Event Type: ${eventType}
Event Date: ${date}
Location: ${location}
Extra Message: ${msg}

Please contact me.`;

        window.open(`https://wa.me/919284969878?text=${encodeURIComponent(fullMsg)}`, '_blank');
        modal.classList.remove('active');
      });

      renderCards();
      setTimeout(()=> { 
        filterServices(categories[0]); 
        document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', (e)=> filterServices(e.target.dataset.category)));
      }, 100);

      document.getElementById('viewServicesBtn').addEventListener('click', (e) => { e.preventDefault(); document.getElementById('services').scrollIntoView({behavior:'smooth'}); });
    })();
  </script>
